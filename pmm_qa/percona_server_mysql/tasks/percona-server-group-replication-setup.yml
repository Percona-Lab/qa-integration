- name: Generate my.cnf for each node
  template:
    src: ./data/my-group-replication.cnf.j2
    dest: "{{ data_dir }}/node{{ item }}/my.cnf"
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Create initialization script for each node
  template:
    src: ./data/init-group-replication.sql.j2
    dest: "{{ data_dir }}/node{{ item }}/init.sql"
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Prepare Container for Percona Server for MySQL
  shell: |
    docker run --rm -d --name="ps_pmm_{{ ps_version }}_{{ item }}" \
      --network="pmm-qa" \
      --privileged --cgroupns=host -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
      -v /var/lib/containerd \
      -v ./ssl:/ssl \
      antmelekhin/docker-systemd:ubuntu-24.04
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Install dependencies
  shell: |
    docker exec ps_pmm_{{ ps_version }}_{{ item }} apt-get update
    docker exec ps_pmm_{{ ps_version }}_{{ item }} apt-get -y install wget gnupg2 lsb-release curl
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Install Percona Release
  shell: |
    docker exec ps_pmm_{{ ps_version }}_{{ item }} wget https://repo.percona.com/apt/percona-release_latest.generic_all.deb
    docker exec ps_pmm_{{ ps_version }}_{{ item }} dpkg -i ./percona-release_latest.generic_all.deb
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Enable Percona Server for MySQL repository
  shell: docker exec ps_pmm_{{ ps_version }}_{{ item }} percona-release enable {{ 'ps-84-lts' if ps_version == '8_4' else 'ps-' + ps_version | replace('_', '') }} release
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Install Percona Server for MySQL
  shell: |
    docker exec ps_pmm_{{ ps_version }}_{{ item }} apt install -y \
      percona-server-server \
      percona-server-rocksdb \
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Start Percona Server for MySQL
  shell: |
    docker exec ps_pmm_{{ ps_version }}_{{ item }} systemctl enable mysql 
    docker exec ps_pmm_{{ ps_version }}_{{ item }} systemctl start mysql
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Copy config file to docker container
  shell: docker cp {{ data_dir }}/node{{ item }}/my.cnf ps_pmm_{{ ps_version }}_{{ item }}:/etc/mysql/my.cnf
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Restart Percona Server for MySQL
  shell: docker exec ps_pmm_{{ ps_version }}_{{ item }} systemctl restart mysql
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Wait 5 seconds for MySQL to start
  pause:
    seconds: 5

- name: Chance root password
  shell: "docker exec ps_pmm_{{ ps_version }}_{{ item }} mysql -e \"ALTER USER 'root'@'localhost' IDENTIFIED WITH caching_sha2_password BY '{{ root_password }}';\""
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Reset configuration for all nodes for MySQL 8.4
  shell: docker exec ps_pmm_{{ ps_version }}_{{ item }} mysql -uroot -p{{ root_password }} -e "RESET BINARY LOGS AND GTIDS; RESET REPLICA ALL;SET GLOBAL gtid_purged='';"
  loop: "{{ range(1, nodes_count | int + 1) | list }}"
  when: {{ ps_version| replace('_', '') | int >= 84 }}

- name: Reset configuration for all nodes for MySQL 8.0
  shell: docker exec ps_pmm_{{ ps_version }}_{{ item }} mysql -uroot -p{{ root_password }} -e "RESET MASTER; RESET SLAVE ALL; SET GLOBAL gtid_purged='';"
  loop: "{{ range(1, nodes_count | int + 1) | list }}"
  when: {{ ps_version| replace('_', '') | int < 84 }}

- name: Bootstrap first node in the cluster
  community.docker.docker_container_exec:
    container: "ps_pmm_{{ ps_version }}_1"
    command: >
      mysql -uroot -p{{ root_password }} -e "
      SET GLOBAL group_replication_bootstrap_group=ON;
      START GROUP_REPLICATION;
      SET GLOBAL group_replication_bootstrap_group=OFF;"
  retries: 5
  delay: 10

- name: Wait 5 seconds for bootstrap to complete
  pause:
    seconds: 5

- name: Start group replication on other nodes
  community.docker.docker_container_exec:
    container: "ps_pmm_{{ ps_version }}_{{ item }}"
    command: mysql -uroot -p{{ root_password }} -e "START GROUP_REPLICATION;"
  loop: "{{ range(2, nodes_count | int + 1) | list }}"
  ignore_errors: yes

- name: Wait 10 seconds for the other nodes to join
  pause:
    seconds: 10

- name: Create and seed a test database on primary
  community.docker.docker_container_exec:
    container: "ps_pmm_{{ ps_version }}_1"
    command: >
      mysql -uroot -p{{ root_password}} -e "
      CREATE DATABASE testdb;
      USE testdb;
      CREATE TABLE testdb (id INT PRIMARY KEY, data VARCHAR(100));
      INSERT INTO testdb VALUES (1, 'Initial data from node mysql1');"

- name: Check replication status on first node
  community.docker.docker_container_exec:
    container: "ps_pmm_{{ ps_version }}_1"
    command: mysql -uroot -p{{ root_password }} -e "SELECT * FROM performance_schema.replication_group_members;"
  register: replication_status

- name: Display replication status
  debug:
    var: replication_status.stdout

- name: Check replication group members count
  community.docker.docker_container_exec:
    container: "ps_pmm_{{ ps_version }}_1"
    command: mysql -uroot -p{{ root_password }} -e "SELECT COUNT(*) AS count FROM performance_schema.replication_group_members;"
  register: member_count

- name: Display member count
  debug:
    var: member_count.stdout

- name: Set verification instructions
  set_fact:
    verification_msg: |
      MySQL Cluster setup complete!

      To verify replication is working:
      1. Connect to the first node:
         docker exec -it ps_pmm_{{ ps_version }}_1 mysql -uroot -p{{ root_password }}

      2. Insert data in the test database:
         USE testdb;
         INSERT INTO testdb VALUES (100, 'Test replication');

      3. Connect to other nodes and verify data is replicated:
         docker exec -it ps_pmm_{{ ps_version }}_2 mysql -uroot -p{{ root_password }}
         USE testdb;
         SELECT * FROM testdb;

- name: Display verification instructions
  debug:
    msg: "{{ verification_msg | split('\n') }}"
