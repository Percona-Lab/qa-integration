- name: Generate my.cnf for each node
  template:
    src: ./data/my.cnf.j2
    dest: "{{ data_dir }}/node{{ item }}/my.cnf"
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Prepare Container for Percona Server for MySQL
  shell: |
    docker run --rm -d --name="ps_pmm_{{ ps_version }}_{{ item }}" \
      --network="pmm-qa" \
      --privileged --cgroupns=host -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
      -v /var/lib/containerd \
      -v ./ssl:/ssl \
      antmelekhin/docker-systemd:ubuntu-24.04
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Install dependencies
  shell: |
    docker exec ps_pmm_{{ ps_version }}_{{ item }} apt-get update
    docker exec ps_pmm_{{ ps_version }}_{{ item }} apt-get -y install wget gnupg2 lsb-release curl
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Install Percona Release
  shell: |
    docker exec ps_pmm_{{ ps_version }}_{{ item }} wget https://repo.percona.com/apt/percona-release_latest.generic_all.deb
    docker exec ps_pmm_{{ ps_version }}_{{ item }} dpkg -i ./percona-release_latest.generic_all.deb
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Enable Percona Server for MySQL repository
  shell: docker exec ps_pmm_{{ ps_version }}_{{ item }} percona-release enable {{ 'ps-84-lts' if ps_version == '8_4' else 'ps-' + ps_version | replace('_', '') }} release
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Install Percona Server for MySQL
  shell: |
    docker exec ps_pmm_{{ ps_version }}_{{ item }} apt install -y \
      percona-server-server \
      percona-server-test \
      percona-server-source \
      percona-server-rocksdb \
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Start Percona Server for MySQL
  shell: |
    docker exec ps_pmm_{{ ps_version }}_{{ item }} systemctl enable mysql 
    docker exec ps_pmm_{{ ps_version }}_{{ item }} systemctl start mysql
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Chance root password
  shell: "docker exec ps_pmm_{{ ps_version }}_{{ item }} mysql -e \"ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ root_password }}';\""
  loop: "{{ range(1, nodes_count | int + 1) | list }}"
