- name: Prepare Container for Percona Server for MySQL 8.0+
  shell: |
    docker run --rm -d --name="ps_pmm_{{ ps_version }}_{{ item }}" \
      --network="pmm-qa" \
      --privileged --cgroupns=host -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
      -v /var/lib/containerd \
      -v ./ssl:/ssl \
      antmelekhin/docker-systemd:ubuntu-24.04
  when: ps_version | replace('_', '') | int >= 80
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Prepare Container for Percona Server for MySQL 5.7
  shell: |
    docker run --rm -d --name="ps_pmm_{{ ps_version }}_{{ item }}" \
      --network="pmm-qa" \
      --privileged --cgroupns=host -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
      -v /var/lib/containerd \
      -v ./ssl:/ssl \
      antmelekhin/docker-systemd:ubuntu-22.04
  when: ps_version | replace('_', '') | int < 80
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Install dependencies
  shell: |
    docker exec ps_pmm_{{ ps_version }}_{{ item }} apt-get update
    docker exec ps_pmm_{{ ps_version }}_{{ item }} apt-get -y install wget gnupg2 lsb-release curl
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Install Percona Release
  shell: |
    docker exec ps_pmm_{{ ps_version }}_{{ item }} wget https://repo.percona.com/apt/percona-release_latest.generic_all.deb
    docker exec ps_pmm_{{ ps_version }}_{{ item }} dpkg -i ./percona-release_latest.generic_all.deb
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Enable Percona Server for MySQL repository
  shell: docker exec ps_pmm_{{ ps_version }}_{{ item }} percona-release enable {{ 'ps-84-lts' if ps_version == '8_4' else 'ps-' + ps_version | replace('_', '') }} release
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Install Percona Server for MySQL
  shell: |
    docker exec ps_pmm_{{ ps_version }}_{{ item }} apt install -y \
      percona-server-server{{ '-5.7' if ps_version | replace('_', '') == '57' else '' }} \
      percona-server-rocksdb{{ '-5.7' if ps_version | replace('_', '') == '57' else '' }} \
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Start Percona Server for MySQL
  shell: |
    docker exec ps_pmm_{{ ps_version }}_{{ item }} systemctl enable mysql 
    docker exec ps_pmm_{{ ps_version }}_{{ item }} systemctl start mysql
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Copy config file to docker container
  shell: docker cp {{ data_dir }}/node{{ item }}/my.cnf ps_pmm_{{ ps_version }}_{{ item }}:/etc/mysql/my.cnf
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Restart Percona Server for MySQL
  shell: docker exec ps_pmm_{{ ps_version }}_{{ item }} systemctl restart mysql
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Wait 5 seconds for MySQL to start
  pause:
    seconds: 5

- name: Chance root password Percona Server for MySQL 5.7
  shell: "docker exec ps_pmm_{{ ps_version }}_{{ item }} mysql -e \"ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ root_password }}';\""
  loop: "{{ range(1, nodes_count | int + 1) | list }}"
  when: ps_version|replace('_', '')|int < 80

- name: Chance root password Percona Server for MySQL 8.0+
  shell: "docker exec ps_pmm_{{ ps_version }}_{{ item }} mysql -e \"ALTER USER 'root'@'localhost' IDENTIFIED WITH caching_sha2_password BY '{{ root_password }}';\""
  loop: "{{ range(1, nodes_count | int + 1) | list }}"
  when: ps_version|replace('_', '')|int >= 80

- name: Run init script on Percona Server for MySQL
  shell: |
    docker cp {{ data_dir }}/node{{ item }}/init.sql ps_pmm_{{ ps_version }}_{{ item }}:/init.sql
    docker exec ps_pmm_{{ ps_version }}_{{ item }} bash -c "mysql -uroot -p{{ root_password }} < /init.sql"
  loop: "{{ range(1, nodes_count | int + 1) | list }}"