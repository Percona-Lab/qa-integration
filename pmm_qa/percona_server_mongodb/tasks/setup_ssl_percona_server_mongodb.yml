- name: Install dependencies
  shell: |
    docker exec psmdb_pmm_{{ psmdb_version }}_{{ item }} dnf install -y openssl
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Get mongod user id
  shell: docker exec psmdb_pmm_{{ psmdb_version }}_1 id -u mongod
  register: mongod_userid

- name: Set mongod user id
  set_fact:
    mongod_userid: "{{mongod_userid.stdout}}"

- name: Create SSL certificates
  include_tasks: ./create_ssl_certificates.yml
  vars:
    container_name: "psmdb_pmm_{{ psmdb_version }}_{{ item }}"
    user_id: "{{ mongod_userid }}"

  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Create correct mongodb pem file
  shell: |
    cat ./ssl/server.crt ./ssl/server.key > ./ssl/mongodb.pem
    cat ./ssl/client.crt ./ssl/client.key > ./ssl/client.pem

- name: Copy new config file to docker container.
  shell: docker cp ./data/mongod_ssl.conf psmdb_pmm_{{ psmdb_version }}_{{ item }}:/etc/mongod.conf
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Restart Percona Server for MongoDB with ssl config
  shell: docker exec psmdb_pmm_{{ psmdb_version }}_{{ item }} systemctl restart mongod
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Wait 10 seconds for database to start
  pause:
    seconds: 10

- name: Create Role for QAN
  shell: |
    docker exec psmdb_pmm_{{ psmdb_version }}_{{ item }} mongosh --tls --tlsCAFile /ssl/ca.crt --tlsCertificateKeyFile /ssl/client.pem admin --eval '
      db.getSiblingDB("admin").createRole({
        "role": "pbmAnyAction",
        "privileges": [{
          "resource": { "anyResource": true },
          "actions": [ "anyAction" ]
        }],
        "roles": []
      });
    '
    docker exec psmdb_pmm_{{ psmdb_version }}_{{ item }} mongosh --tls --tlsCAFile /ssl/ca.crt --tlsCertificateKeyFile /ssl/client.pem admin --eval '
      db.getSiblingDB("admin").createRole({
        role: "explainRole",
        privileges: [
          {
            resource: { db: "", collection: "" },
            actions: [
              "listIndexes",
              "listCollections",
              "dbStats",
              "dbHash",
              "collStats",
              "find",
              "indexStats"
            ]
          },
          {
            resource: { db: "", collection: "system.profile" },
            actions: ["dbStats", "collStats", "indexStats"]
          }
        ],
        roles: []
      });
    '
  loop: "{{ range(1, nodes_count | int + 1) | list }}"
- name: Create x509 user in Percona MongoDB
  shell: |
    docker exec psmdb_pmm_{{ psmdb_version }}_{{ item }} mongosh --tls --tlsCAFile /ssl/ca.crt --tlsCertificateKeyFile /ssl/client.pem admin --eval '
      db.getSiblingDB("$external").runCommand({
        createUser: "C=US,ST=California,L=San Francisco,O=Percona,OU=client,CN=localhost,emailAddress=test@percona.com",
        roles: [
          { "db" : "admin", "role": "explainRole" },
          { "db" : "local", "role": "read" },
          { "db" : "admin", "role" : "readWrite", "collection": "" },
          { "db" : "admin", "role" : "backup" },
          { "db" : "admin", "role" : "clusterMonitor" },
          { "db" : "admin", "role" : "restore" },
          { "db" : "admin", "role" : "pbmAnyAction" },
        ]
      })
    '
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Verify ssl connection to mongodb
  shell: "docker exec psmdb_pmm_{{ psmdb_version }}_{{ item }} mongosh \"mongodb://127.0.0.1:27017/?tls=true\" --tlsCAFile /ssl/ca.crt --tlsCertificateKeyFile /ssl/client.pem --eval 'db.runCommand({ connectionStatus: 1 })'"
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

