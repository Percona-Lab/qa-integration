- name: Prepare Container for MySQL 8.0+
  shell: |
    docker run --rm -d --name="{{ container_prefix }}{{ item }}" \
      --network="pmm-qa" \
      --privileged --cgroupns=host -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
      -v /var/lib/containerd \
      -v ./ssl:/ssl \
      antmelekhin/docker-systemd:ubuntu-24.04
  when: mysql_version | replace('_', '') | int >= 80
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Prepare Container for MySQL 5.7
  shell: |
    docker run --rm -d --name="{{ container_prefix }}{{ item }}" \
      --network="pmm-qa" \
      --privileged --cgroupns=host -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
      -v /var/lib/containerd \
      -v ./ssl:/ssl \
      antmelekhin/docker-systemd:ubuntu-22.04
  when: mysql_version | replace('_', '') | int < 80
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Install dependencies
  shell: |
    docker exec {{ container_prefix }}{{ item }} apt-get update
    docker exec {{ container_prefix }}{{ item }} apt-get -y install wget gnupg2 lsb-release curl xz-utils libnuma1
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Install MySQL 8.0+ dependencies
  shell: |
    docker exec {{ container_prefix }}{{ item }} apt-get update
    docker exec {{ container_prefix }}{{ item }} apt-get install -y libncurses6 libaio1t64
    docker exec {{ container_prefix }}{{ item }} ln -s /usr/lib/x86_64-linux-gnu/libaio.so.1t64 /usr/lib/x86_64-linux-gnu/libaio.so.1
  loop: "{{ range(1, nodes_count | int + 1) | list }}"
  when: mysql_version | replace('_', '') | int >= 80

- name: Install MySQL 5.7 dependencies
  shell: |
    docker exec {{ container_prefix }}{{ item }} apt-get update
    docker exec {{ container_prefix }}{{ item }} apt-get install -y libaio1 libncurses5
  loop: "{{ range(1, nodes_count | int + 1) | list }}"
  when: mysql_version | replace('_', '') | int == 57

- name: Query Docker Hub for MySQL tags
  uri:
    url: "https://hub.docker.com/v2/repositories/library/mysql/tags?page_size=100&name={{ mysql_version | replace('_', '.') }}"
    method: GET
    return_content: yes
  register: mysql_tags_response

- name: Extract tag names (only versions)
  set_fact:
    mysql_exact_version: "{{ mysql_tags_response.json.results | map(attribute='name') | list | select('match', '^[0-9]+\\.[0-9]+\\.[0-9]+$') | first }}"

- name: Install MySQL 8.0+
  shell: |
    docker exec {{ container_prefix }}{{ item }} wget -q -O mysql.tar.xz https://dev.mysql.com/get/Downloads/MySQL-{{ mysql_version | replace('_', '.') }}/mysql-{{ mysql_exact_version }}-linux-glibc2.28-x86_64.tar.xz
    docker exec {{ container_prefix }}{{ item }} tar -xf mysql.tar.xz
    docker exec {{ container_prefix }}{{ item }} groupadd mysql
    docker exec {{ container_prefix }}{{ item }} useradd -r -g mysql -s /bin/false mysql
    docker exec {{ container_prefix }}{{ item }} mv mysql-{{ mysql_exact_version }}-linux-glibc2.28-x86_64 /usr/local/mysql
    docker exec {{ container_prefix }}{{ item }} ln -s /usr/local/mysql-{{ mysql_exact_version }}-linux-glibc2.28-x86_64 mysql
    docker exec {{ container_prefix }}{{ item }} chown -R mysql:mysql /usr/local/mysql
    docker exec {{ container_prefix }}{{ item }} mkdir /usr/local/mysql/data
    docker exec {{ container_prefix }}{{ item }} chown mysql:mysql /usr/local/mysql/data
    docker exec {{ container_prefix }}{{ item }} /usr/local/mysql/bin/mysqld --initialize --user=mysql --basedir=/usr/local/mysql --datadir=/usr/local/mysql/data
    docker exec {{ container_prefix }}{{ item }} cp /usr/local/mysql/support-files/mysql.server /etc/init.d/mysql
    docker exec {{ container_prefix }}{{ item }} chmod +x /etc/init.d/mysql
    docker exec {{ container_prefix }}{{ item }} sh -c "echo 'export PATH=/usr/local/mysql/bin:\$PATH' >> /etc/profile"
    docker exec {{ container_prefix }}{{ item }} ln -s /usr/local/mysql/bin/mysql /usr/bin/mysql
    docker exec {{ container_prefix }}{{ item }} bash -c 'source ~/.bashrc'
  loop: "{{ range(1, nodes_count | int + 1) | list }}"
  register: mysql_80_root_password
  when: mysql_version | replace('_', '') | int >= 80

- name: Install MySQL 5.7
  shell: |
    docker exec {{ container_prefix }}{{ item }} wget -q -O mysql.tar.gz https://downloads.mysql.com/archives/get/p/23/file/mysql-5.7.44-linux-glibc2.12-x86_64.tar.gz
    docker exec {{ container_prefix }}{{ item }} tar zxf mysql.tar.gz
    docker exec {{ container_prefix }}{{ item }} groupadd mysql
    docker exec {{ container_prefix }}{{ item }} useradd -r -g mysql -s /bin/false mysql
    docker exec {{ container_prefix }}{{ item }} mv mysql-5.7.44-linux-glibc2.12-x86_64 /usr/local/mysql
    docker exec {{ container_prefix }}{{ item }} ln -s /usr/local/mysql-5.7.44-linux-glibc2.12-x86_64 mysql
    docker exec {{ container_prefix }}{{ item }} chown -R mysql:mysql /usr/local/mysql
    docker exec {{ container_prefix }}{{ item }} mkdir /usr/local/mysql/data
    docker exec {{ container_prefix }}{{ item }} chown mysql:mysql /usr/local/mysql/data
    docker exec {{ container_prefix }}{{ item }} /usr/local/mysql/bin/mysqld --initialize --user=mysql --basedir=/usr/local/mysql --datadir=/usr/local/mysql/data
    docker exec {{ container_prefix }}{{ item }} cp /usr/local/mysql/support-files/mysql.server /etc/init.d/mysql
    docker exec {{ container_prefix }}{{ item }} chmod +x /etc/init.d/mysql
    docker exec {{ container_prefix }}{{ item }} sh -c "echo 'export PATH=/usr/local/mysql/bin:\$PATH' >> /etc/profile"
    docker exec {{ container_prefix }}{{ item }} ln -s /usr/local/mysql/bin/mysql /usr/bin/mysql
    docker exec {{ container_prefix }}{{ item }} bash -c 'source ~/.bashrc'
  loop: "{{ range(1, nodes_count | int + 1) | list }}"
  register: mysql_57_root_password
  when: mysql_version | replace('_', '') | int == 57

- name: Debug MySQL root password for MySQL 8.0+
  debug:
    msg: "{{ mysql_80_root_password }}"

- name: Store Mysql root password for MySQL 8.0+
  set_fact:
    mysql_root_password: "{{ mysql_80_root_password.results[0].stderr | regex_search('root@localhost: (.+)', '\\1') | first }}"
  when: mysql_version | replace('_', '') | int >= 80

- name: Store Mysql root password for MySQL 5.7
  set_fact:
    mysql_root_password: "{{ mysql_57_root_password.results[0].stderr | regex_search('root@localhost: (.+)', '\\1') | first }}"
  when: mysql_version | replace('_', '') | int == 57

- name: Start MySQL
  shell: |
    docker exec {{ container_prefix }}{{ item }} systemctl enable mysql 
    docker exec {{ container_prefix }}{{ item }} systemctl start mysql
  loop: "{{ range(1, nodes_count | int + 1) | list }}"

- name: Wait 5 seconds for MySQL to start
  pause:
    seconds: 5

- name: Chance root password Percona Server for MySQL 5.7
  shell: "docker exec {{ container_prefix }}{{ item }} mysql --connect-expired-password -uroot -p'{{ mysql_root_password }}' -e \"ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ root_password }}';\""
  loop: "{{ range(1, nodes_count | int + 1) | list }}"
  when: mysql_version|replace('_', '')|int < 80

- name: Chance root password Percona Server for MySQL 8.0+
  shell: "docker exec {{ container_prefix }}{{ item }} mysql --connect-expired-password -uroot -p'{{ mysql_root_password }}' -e \"ALTER USER 'root'@'localhost' IDENTIFIED WITH caching_sha2_password BY '{{ root_password }}';\""
  loop: "{{ range(1, nodes_count | int + 1) | list }}"
  when: mysql_version|replace('_', '')|int >= 80